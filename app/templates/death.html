<!--
death.html
Game over / You Died screen.

Commit 12 addition:
- Bestiary link added alongside the Restart button
- Font Awesome loaded for the book-skull icon
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Elden Souls is a Flask-based, text-driven adventure game inspired by Dark Souls and Elden Ring. Choose your class, battle lore-rich enemies, explore branching story paths, and make impactful decisions that shape the fate of a fallen world. Built in Python with deep narrative, RPG mechanics, and session-based progression.">
    <title>You Died — Elden Souls</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/battle.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <video
        id="story-bg-video"
        autoplay muted loop playsinline
        preload="auto"
        aria-hidden="true"
        poster="{{ url_for('static', filename='images/areas/bonfire.jpg') }}"
    >
        <source src="{{ url_for('static', filename='videos/dark-souls-bonfire.mp4') }}" type="video/mp4">
    </video>

    <div class="bonfire-bg">
        <h1 class="you-died" style="color: crimson; font-size: 3rem;">YOU DIED</h1>
        <p class="battle-info" style="font-style: italic; margin-bottom: 20px;">The flames fade... but your will endures.</p>

        {% if ng_level is defined and ng_level > 0 %}
        <p class="death-ng-note" style="color: #e74c3c; font-size: 0.9rem; margin-bottom: 1rem;">
            You fell on Journey {{ ng_level + 1 }}.
        </p>
        {% endif %}

        <form action="{{ url_for('main.restart') }}" method="post">
            <button type="submit" style="padding: 10px 20px; font-weight: bold;">
                <i class="fas fa-rotate-left"></i> Restart
            </button>
        </form>

        {# ── Commit 12: bestiary link — useful to study enemies after dying ── #}
        <div class="menu" style="margin-top: 1.2rem;">
            <a href="{{ url_for('main.bestiary') }}" style="color: rgba(201,168,76,0.80); letter-spacing: 0.06em;">
                <i class="fas fa-book-skull"></i> Study the Bestiary
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/audio_manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
    <script>
    sessionStorage.setItem('elden_fast', '1');
    // Fade in background video once ready
    const vid = document.getElementById('story-bg-video');
    if (vid) {
        if (vid.readyState >= 3) { vid.classList.add('loaded'); }
        else { vid.addEventListener('canplaythrough', () => vid.classList.add('loaded'), { once: true }); }
    }
    </script>

</body>
</html>
